<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รดน้ำขอพร</title>

    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            overflow: hidden;
        }

        .page {
            display: none;
            width: 100%;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
        }

        .page.active {
            display: block;
        }

        .bg-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;

            /* ⭐ แก้ปัญหาปุ่มกดไม่ได้ */
            pointer-events: none;
        }

        .btn-wrapper {
            position: absolute;
            bottom: 10%;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .btn-main {
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 30px;
            border: none;
            cursor: pointer;

            /* ⭐ กันโดนบัง */
            position: relative;
            z-index: 1000;
        }
    </style>
</head>

<body>

<!-- หน้า 1 -->
<div id="page1" class="page active">
    <img src="https://i.ibb.co/qYvnnpC0/2.png" class="bg-img">

    <div class="btn-wrapper">
        <button class="btn-main" onclick="goToPage(2)">
            กดเข้าร่วมพิธี
        </button>
    </div>
</div>

<!-- หน้า 2 -->
<div id="page2" class="page">
    <img src="https://i.ibb.co/nMgR2nJV/3.png" class="bg-img">

    <div class="btn-wrapper">
        <button class="btn-main" onclick="goToPage(1)">
            กลับหน้าแรก
        </button>
    </div>
</div>

<script>
function goToPage(n) {
    const pages = document.querySelectorAll('.page');
    pages.forEach(p => p.classList.remove('active'));

    const target = document.getElementById('page' + n);
    if (target) {
        target.classList.add('active');
    }
}
</script>

</body>
</html>
